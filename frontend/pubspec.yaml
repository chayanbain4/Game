name: frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.6+9
environment:
  sdk: ^3.10.4

dependencies:
  http: ^1.1.0
  shared_preferences: ^2.3.3
  lottie: ^3.1.0
  audioplayers: ^5.2.1
  dio: ^5.4.0
  open_filex: ^4.3.2
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  socket_io_client: ^3.1.4
  provider: ^6.1.5+1
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/image/logo.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/image/